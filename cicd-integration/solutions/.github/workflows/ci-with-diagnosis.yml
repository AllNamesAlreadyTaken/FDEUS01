name: CI with Copilot diagnosis

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: pytest
        continue-on-error: true
        run: pytest --tb=short 2>&1 | tee pytest-output.log

      - name: Upload pytest output
        if: steps.pytest.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: pytest-output
          path: pytest-output.log

      - name: Install Copilot CLI
        if: steps.pytest.outcome == 'failure'
        run: npm install -g @github/copilot@latest

      - name: Diagnose failures with Copilot CLI
        if: steps.pytest.outcome == 'failure'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          PROMPT=$(cat <<'PROMPT_EOF'
          Analyze the pytest output and identify the root cause of each failure.
          Produce a markdown report with one section per failing test, each with:
            1. Test name (the exact pytest node id).
            2. Assertion or error the test produced.
            3. Most likely root cause, stated as a hypothesis.
            4. A specific code change that would fix it, including the file and a minimal diff.
          Do not speculate about unrelated issues. Only analyze failures
          visible in the input. If the input shows no failures, output a
          single line stating "No failures detected" and nothing else.
          PROMPT_EOF
          )
          cat pytest-output.log | copilot -p "$PROMPT" > diagnosis.md

      - name: Upload diagnosis
        if: steps.pytest.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: copilot-diagnosis
          path: diagnosis.md

      - name: Fail the job if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1

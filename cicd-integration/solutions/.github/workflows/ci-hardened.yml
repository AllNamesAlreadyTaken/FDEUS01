name: CI (hardened)

on:
  push:
    branches: [main]
  pull_request:

# Minimum permissions: read code, nothing else.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Production-grade pin: replace the major-version tag (e.g., @v6) with an
      # immutable SHA here and on every subsequent uses: line. Version tags can
      # be re-pointed; SHAs cannot.
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: pytest
        continue-on-error: true
        run: pytest --tb=short 2>&1 | tee pytest-output.log

      - name: Sanitize pytest output
        if: steps.pytest.outcome == 'failure'
        # Drop lines that look like they could contain secrets, credentials,
        # or absolute paths that would reveal the runner environment.
        run: |
          grep -Ev '(?i)(password|secret|token|api[_-]?key|bearer|authorization)' pytest-output.log \
            | sed -E 's#/home/[^ ]+#<HOME>#g; s#/runner/_work/[^ ]+#<WORKDIR>#g' \
            > pytest-output.sanitized.log
          mv pytest-output.sanitized.log pytest-output.log

      - name: Upload pytest output (sanitized)
        if: steps.pytest.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: pytest-output
          path: pytest-output.log

      - name: Install Copilot CLI
        if: steps.pytest.outcome == 'failure'
        run: npm install -g @github/copilot@latest

      - name: Diagnose failures with Copilot CLI (hook-gated)
        if: steps.pytest.outcome == 'failure'
        # The preToolUse hook is registered in .github/hooks/hooks.json,
        # which Copilot CLI discovers automatically when it runs inside
        # the repository. The hook denies any tool call that is not on
        # the pipeline safe list. No workflow-level flag or env var is
        # needed — the registration file is the contract.
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          PROMPT=$(cat <<'PROMPT_EOF'
          Analyze the pytest output and identify the root cause of each failure.
          Produce a markdown report with one section per failing test.
          Do not attempt to modify any file. Do not execute any command
          beyond the pytest output already provided. Base your analysis
          on the input only.
          PROMPT_EOF
          )
          cat pytest-output.log | copilot -p "$PROMPT" > diagnosis.md

      - name: Upload diagnosis
        if: steps.pytest.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: copilot-diagnosis
          path: diagnosis.md

      - name: Fail the job if tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1
